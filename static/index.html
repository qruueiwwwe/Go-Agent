<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ollama AI Agent - 本地智能助手，支持天气查询、数学计算、文件处理">
    <meta name="keywords" content="AI, Ollama, 智能助手, 天气, 计算, 文件处理">
    <meta name="theme-color" content="#667eea">
    
    <title>智能助手</title>
    
    <!-- 样式表 -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
    
    <style>
        /* 全屏应用布局 */
        html, body, #app {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Vue 应用挂载点 -->
    <div id="app"></div>
    
    <!-- Vue 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 代码高亮 -->
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-theme">
    
    <!-- XSS 防护 -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    
    <!-- 应用入口 -->
    <script type="module">
        // 导入应用
        import app from '/js/app.js';
        
        // 挂载应用
        app.mount('#app');
        
        // 调试信息
        console.log('✓ 智能助手应用已启动');
        console.log('✓ Vue 版本:', Vue.version);
    </script>
</body>
</html>
